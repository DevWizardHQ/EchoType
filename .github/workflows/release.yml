name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # A STABLE signing identity (same cert every release) is what lets macOS
      # TCC permissions (Accessibility, Microphone) survive app updates —
      # ad-hoc signing changes identity per build and resets permissions.
      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.SIGNING_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.SIGNING_CERT_P12_PASSWORD }}
        run: |
          echo "$CERT_P12" | base64 -d > cert.p12
          security create-keychain -p ci-temp build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci-temp build.keychain
          security set-keychain-settings -lut 3600 build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ci-temp build.keychain >/dev/null
          # Trust the self-signed cert for code signing so the identity is valid.
          openssl pkcs12 -in cert.p12 -clcerts -nokeys -passin "pass:$CERT_PASSWORD" -out cert.pem
          sudo security add-trusted-cert -d -r trustRoot -k /Library/Keychains/System.keychain cert.pem
          rm cert.p12 cert.pem
          security find-identity -v -p codesigning build.keychain

      - name: Build app bundle
        run: ./scripts/build-app.sh release

      - name: Stamp version from tag and sign
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" dist/EchoType.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" dist/EchoType.app/Contents/Info.plist
          codesign --force --sign "DevWizardHQ Release" --identifier com.devwizardhq.echotype dist/EchoType.app
          codesign --verify --verbose=2 dist/EchoType.app

      - name: Package zip (used by in-app self-update)
        run: |
          cd dist
          ditto -c -k --keepParent EchoType.app EchoType.zip
          shasum -a 256 EchoType.zip > EchoType.zip.sha256

      - name: Package dmg (drag-to-Applications installer)
        run: |
          brew install create-dmg
          mkdir -p dmg-root
          cp -R dist/EchoType.app dmg-root/
          create-dmg \
            --volname "EchoType" \
            --volicon Resources/AppIcon.icns \
            --background Resources/dmg-background.tiff \
            --window-pos 200 150 \
            --window-size 660 400 \
            --icon-size 128 \
            --text-size 13 \
            --icon "EchoType.app" 165 200 \
            --app-drop-link 495 200 \
            --hide-extension "EchoType.app" \
            --no-internet-enable \
            dist/EchoType.dmg dmg-root
          cd dist
          shasum -a 256 EchoType.dmg > EchoType.dmg.sha256

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          # Fall back to a generic note if the version is missing from the changelog.
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "EchoType $VERSION" > release-notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "EchoType ${GITHUB_REF_NAME#v}" \
            --notes-file release-notes.md \
            dist/EchoType.dmg dist/EchoType.dmg.sha256 \
            dist/EchoType.zip dist/EchoType.zip.sha256
